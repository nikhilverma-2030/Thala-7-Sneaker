<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala 7 Sneaker Store (Home Page)</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
    rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header section and Navigations -->
    <header class="header">
            <nav class="navbar">
                <div class="logo">
                    <h2>Thala <span class="tagline">7.</span></h2>
                </div>
                <ul class="nav-links">
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#brands">Brands
                        <i class="ri-arrow-drop-down-line"></i>
                    </a></li>
                    <li><a href="#more">More
                       <i class="ri-arrow-drop-down-line"></i>
                    </a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
                     <div class="nav-icons">
                        <div class="search-btn">
                            <i class="ri-search-line"></i>
                            <input type="text" name="search" placeholder="Search..">
                        </div>
                        <div class="cart-box">
                            <i class="ri-shopping-bag-line"></i>
                            <span class="valu">0</span>
                        </div>
                         <img src="https://i.pravatar.cc/40" alt="profile">
                     </div>
            </nav>
        </header>
        <!-- Declare fake header -->
        <div class="fake-header"></div>
        <main>
            <!-- Hero Section and Home Page -->
            <section class="hero" id="home">
                <div class="hero-content">
                    <div class="hero-text">
                        <div class="brand-img">
                            <img src="./images/brand-name.png" alt="brand-image">
                        </div>
                        <h2>7!! Thala For <br> a <span class="reason-text">Reason!</span></h2>
                        <p>Welcome to Thala 7, your ultimate destination for premium sneakers that combine style, comfort, and performance. Inspired by the iconic number 7.</p>
                        <button type="submit" class="shop-btn">
                            <a href="product.html#product" target="_blank"> Shop Now</a>
                        </button>
                    </div>
                    <div class="hero-img">
                        <img src="./images/shoes.png" alt="shoes-img">
                    </div>
                </div>
            </section>
            <section class="stats">
                <div class="stats-container">
                    <div class="stats-item">
                        <img src="https://cdn-icons-png.flaticon.com/128/11213/11213138.png" alt="Review-icon">
                        <p>2k+ <br><span class="bottom-text">Reviews</span></p>
                    </div>
                    <div class="stats-item">
                        <img  src="https://cdn-icons-png.flaticon.com/128/3126/3126649.png" alt="Customer-icon">
                        <p>30k+ <br><span class="bottom-text">Customers</span></p>
                    </div>
                    <div class="stats-item">
                        <img  src="https://cdn-icons-png.flaticon.com/128/4497/4497492.png" alt="High-quality">
                        <p>High <br> <span class="bottom-text">Quality</span></p>
                    </div>
                    <div class="stats-item">
                        <img src="https://cdn-icons-png.flaticon.com/128/3163/3163706.png" alt="rating">
                        <p>4.5/5 <br><span class="bottom-text">Rating</span></p>
                    </div>
                </div>
            </section>
        </main>    
    </body>
</html>
